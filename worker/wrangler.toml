# wrangler.toml
# Cloudflare Worker configuration for Second-Hand Ad & Pricing Generator

name = "tweedehands-ad-generator-backend"
main = "index.ts"
compatibility_date = "2024-03-01"

[vars]
# Add these environment variables in your Cloudflare Dashboard Secrets:
# GOOGLE_CLIENT_ID = "your-client-id"
# GOOGLE_CLIENT_SECRET = "your-client-secret"
# REDIRECT_URI = "https://your-worker.your-subdomain.workers.dev/api/auth/callback"
# GEMINI_API_KEY = "your-gemini-api-key"

[[kv_namespaces]]
binding = "AUTH_KV"
id = "your_kv_namespace_id_here"
